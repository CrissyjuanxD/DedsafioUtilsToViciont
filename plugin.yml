name: DTools3
version: '1.1.3-SNAPSHOT'
main: com.francobm.dtools3.DTools3
api-version: '1.16'
commands:
  dtools3:
    description: DTools3 commands
    usage: /<command>
    aliases: [dtools, dt, dt3]
  soul:
    description: See the soul of the player
    usage: /<command>
    aliases: [alma]
  lives:
    description: See the lives of the player
    usage: /<command>
    aliases: [vidas]
  spawnslotmachine:
    description: Spawn a slot machine at your location
    usage: /<command>
    permission: viciont.slotmachine.spawn
  giveslotmachine:
    description: Give slot machine item to a player
    usage: /<command> [player] [amount]
    permission: viciont.slotmachine.give
softdepend:
  - PlaceholderAPI
  - StreamEvents
  - ModelEngine
  - BetterRevive
  - Multiverse-Core